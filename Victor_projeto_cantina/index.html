<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cantina do sesc</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header class="cabecalho">
        <figure class="logo"><img src="image/senac_logo.png" alt="logo do senac"></figure> 
        <nav>
            <ul>
                <li><a href="#imagem">Imagem</a></li>
                <li><a href="#cardapio">Cardapio</a></li>
                <li><a href="#carrinho">Carrinho</a></li>
            </ul>
         </nav>
    </header>

    <main>
        <h1 id="imagem" class="imagem">
            Imagem
        </h1>

        <figure class="foto_cantina"> 
        <img src="image/cantina.jpg" alt="Foto da cantina do sesc de São José Dos Pinhais">
        <figcaption> foto da cantina fo sesc</figcaption>
        </figure>
        </div>
         
        <hr>

        <section >
        <h1 id="cardapio" class="produtos">
             Produtos 
        </h1>
        
        <div class="cardapio">
         <figure class=" fig1"> 
            <img src="image/pao-de-queijo.jpg" alt="pão de queijo">
            <figcaption>pão de queijo</figcaption>
            <figcaption>preço 2,50</figcaption>
            <button>adicionar</button>
         </figure>

         <figure class=" fig1"> 
            <img src="image/D_NQ_NP_808296-MLB110421210549_042026-O.webp" alt="suco sabor maracuja">
            <figcaption>suco de maracuja</figcaption>
            <figcaption>preço 5,00</figcaption>
            <button>adicionar</button>
         </figure>

         <figure class=" fig1"> 
            <img src="image/pastel.jpg" alt="pastel assado">
            <figcaption>pastel assado </figcaption>
            <figcaption>preço 7,00</figcaption>
            <button>adicionar</button>
         </figure>

         <figure class=" fig1"> 
            <img src="image/cafe.jpg" alt="café com leite">
            <figcaption>café com leite</figcaption>
            <figcaption>preço 5,00</figcaption>
            <button>adicionar</button>
         </figure>

         <figure class=" fig1"> 
            <img src="image/pastel-folhado.webp" alt="folhado">
            <figcaption>folhado</figcaption>
            <figcaption>preço 5,00</figcaption>
            <button>adicionar</button>
         </figure>
        </div>
        </section>

        <hr>

        <div class="compra">
         <h1 id="carrinho" class="carrinho">
            Carrinho
         </h1>

         <figure class="box"></figure>

        </div>

        <hr>

    </main>

    <footer>
        <div>
            <p>Senac</p>
            <p>Fecomércio Sesc</p>
        </div>
    </footer>

</body>
</html>
